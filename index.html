<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#1e3a5f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Dispromax"/>
<link rel="manifest" href="manifest.json"/>
<title>Dispromax</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<style>
/* ── VARIABLES CORPORATIVAS ─────────────────────────────── */
:root{
  --az:#1e3a5f;   /* Azul marino Dispromax */
  --az2:#2d5282;
  --az3:#3a6ba8;
  --rj:#c0392b;   /* Rojo terracota Dispromax */
  --rj2:#e74c3c;
  --rj3:#f1948a;
  --bl:#ffffff;
  --bg:#f4f6f9;
  --bg2:#eaecf0;
  --tx:#1a1a2e;
  --tx2:#4a4a6a;
  --ok:#27ae60;
  --warn:#f39c12;
  --err:#e74c3c;
  --info:#2980b9;
  --r:12px;--r2:8px;
  --sh:0 2px 12px rgba(30,58,95,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;color:var(--tx);display:flex;flex-direction:column;}

/* ── HEADER ────────────────────────────────────────────── */
#header{background:linear-gradient(135deg,var(--az),var(--az2));color:white;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);}
#header-logo{height:38px;width:auto;}
#header-info{flex:1;}
#header-title{font-size:1.05rem;font-weight:700;letter-spacing:.02em;}
#header-sub{font-size:.65rem;opacity:.75;margin-top:1px;}
#header-right{display:flex;gap:6px;}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white;padding:6px 10px;border-radius:var(--r2);font-size:.75rem;cursor:pointer;font-weight:600;}

/* ── NAVBAR ─────────────────────────────────────────────── */
#navbar{background:var(--az);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:2px solid var(--rj);}
#navbar::-webkit-scrollbar{display:none;}
.nav-btn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 14px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.6);font-size:9.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative;}
.nav-btn .ni{font-size:17px;line-height:1;}
.nav-btn.active{color:white;border-bottom-color:var(--rj);}

/* ── CONTENT ────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:14px 12px 80px;max-width:600px;margin:0 auto;}
.page.active{display:block;}
.pg-title{font-size:1.3rem;font-weight:700;color:var(--az);margin-bottom:2px;}
.pg-sub{font-size:.73rem;color:var(--tx2);margin-bottom:14px;}

/* ── CARDS & KPIs ───────────────────────────────────────── */
.card{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.kpi{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:12px;border-left:4px solid var(--az);}
.kpi.red{border-left-color:var(--rj);}
.kpi.green{border-left-color:var(--ok);}
.kpi-val{font-size:1.2rem;font-weight:700;color:var(--az);line-height:1;margin-bottom:3px;}
.kpi-lbl{font-size:.67rem;color:var(--tx2);}

/* ── FORMULARIOS & INPUTS ───────────────────────────────── */
.fgroup{margin-bottom:11px;}
.lbl{display:block;font-size:.7rem;font-weight:600;color:var(--az);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--bg2);color:var(--tx);padding:10px 12px;border-radius:var(--r2);font-size:.9rem;font-family:inherit;outline:none;}
.inp:focus{border-color:var(--az3);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.span2{grid-column:1/-1;}

/* ── MODALES ────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.overlay.open{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;padding:18px 14px 28px;width:100%;max-width:560px;max-height:93vh;overflow-y:auto;position:relative;}
.modal-handle{width:36px;height:4px;background:var(--bg2);border-radius:2px;margin:0 auto 14px;}

/* ── BOTONES ────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r2);font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-p{background:var(--az);color:white;}
.btn-r{background:var(--rj);color:white;}
.btn-s{background:var(--bg);border:1px solid var(--bg2);color:var(--tx);}
.btn-full{width:100%;}

/* ── FAB ────────────────────────────────────────────────── */
.fab{position:fixed;bottom:68px;right:14px;width:52px;height:52px;border-radius:50%;background:var(--rj);color:white;border:none;font-size:1.5rem;box-shadow:0 4px 20px rgba(192,57,43,.45);display:flex;align-items:center;justify-content:center;z-index:50;}

/* ── OFFLINE BANNER ─────────────────────────────────────── */
#offline-banner{background:var(--warn);color:white;text-align:center;padding:5px;font-size:.75rem;font-weight:600;display:none;}
#offline-banner.show{display:block;}

</style>
</head>
<body>

<div id="offline-banner"> 📡 Sin conexión — modo offline</div>

<div id="header">
  <svg id="header-logo" viewBox="0 0 200 80" height="38">
    <polygon points="30,5 55,5 70,28 55,51 30,51 15,28" fill="none" stroke="#c0392b" stroke-width="3.5"/>
    <rect x="28" y="18" width="16" height="14" rx="2" fill="#c0392b"/>
    <text x="75" y="32" font-family="Arial" font-weight="800" font-size="18" fill="white">DISPRO</text>
    <text x="130" y="32" font-family="Arial" font-weight="800" font-size="18" fill="#c0392b">MAX</text>
    <text x="75" y="48" font-family="Arial" font-size="8.5" fill="rgba(255,255,255,0.75)">LOGÍSTICA HORECA | ATLÁNTICO</text>
  </svg>
  <div id="header-right">
    <button class="hbtn" onclick="go('config',document.querySelector('.nav-btn:last-child'))"> ⚙️ </button>
  </div>
</div>

<div id="navbar">
  <button class="nav-btn active" onclick="go('dash',this)"><span class="ni"> 📊 </span>Inicio</button>
  <button class="nav-btn" onclick="go('pedidos-nueva',this)"><span class="ni"> 🛒 </span>Pedido</button>
  <button class="nav-btn" onclick="go('historial',this)"><span class="ni"> 📋 </span>Historial</button>
  <button class="nav-btn" onclick="go('productos',this)"><span class="ni"> 📦 </span>Productos</button>
  <button class="nav-btn" onclick="go('clientes',this)"><span class="ni"> 👥 </span>Clientes</button>
  <button class="nav-btn" onclick="go('proveedores',this)"><span class="ni"> 🏭 </span>Proveedores</button>
  <button class="nav-btn" onclick="go('config',this)"><span class="ni"> ⚙️ </span>Config</button>
</div>

<div id="content">
  <div id="page-dash" class="page active">
    <p class="pg-title">Panel de control</p>
    <div class="kpi-grid" id="kpis">
      <div class="kpi"><div class="kpi-val" id="dash-pedidos-count">0</div><div class="kpi-lbl">Pedidos Hoy</div></div>
      <div class="kpi green"><div class="kpi-val" id="dash-ventas-hoy">$0</div><div class="kpi-lbl">Ventas Hoy</div></div>
    </div>
    <div class="card"><h3> 📈 Ventas del mes</h3><div id="dash-grafico"></div></div>
    <div class="card"><h3> 🕐 Pedidos recientes</h3><div id="dash-lista-pedidos"></div></div>
  </div>

  <div id="page-pedidos-nueva" class="page">
    <p class="pg-title">Nuevo Pedido</p>
    <div class="card">
      <div class="fgroup"><label class="lbl">Cliente</label><select class="inp" id="ped-cliente"><option value="">Selecciona cliente...</option></select></div>
      <div class="grid2">
        <div class="fgroup"><label class="lbl">Fecha Entrega</label><input type="date" class="inp" id="ped-fecha"/></div>
        <div class="fgroup"><label class="lbl">Estado</label><select class="inp" id="ped-estado"><option>Pendiente</option><option>Entregado</option></select></div>
      </div>
    </div>
    <div id="ped-items"></div>
    <button class="btn btn-p btn-full" onclick="guardarPedido()">GUARDAR PEDIDO</button>
  </div>

  <div id="page-productos" class="page">
    <p class="pg-title">Productos</p>
    <input class="inp" id="prod-search" placeholder="Buscar producto..." oninput="rProductos()"/>
    <div id="prod-list" style="margin-top:15px;"></div>
  </div>

  <div id="page-clientes" class="page">
    <p class="pg-title">Clientes</p>
    <div id="cli-list"></div>
  </div>

  <div id="page-proveedores" class="page">
    <p class="pg-title">Proveedores</p>
    <div id="prov-list"></div>
  </div>
</div>

<div class="overlay" id="m-producto">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Gestionar Producto</h3>
    <div class="grid2">
      <div class="fgroup span2"><label class="lbl">Nombre</label><input class="inp" id="mp-nombre"/></div>
      <div class="fgroup"><label class="lbl">Precio Venta</label><input type="number" class="inp" id="mp-pventa"/></div>
      <div class="fgroup"><label class="lbl">Stock</label><input type="number" class="inp" id="mp-stock"/></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-s" onclick="cerrar('m-producto')">Cerrar</button>
      <button class="btn btn-p" style="flex:1" onclick="upsertProducto()">Guardar</button>
    </div>
  </div>
</div>

<button class="fab" onclick="abrir('m-producto')"> ＋ </button>

<script>
// ════════════════════════════════════════════════════════════
// CONFIGURACIÓN SUPABASE CORREGIDA
// ════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://cosxgumrxgihkeszvgwu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_B58gh4o9vrHK58hNramtGw_yRck0jwX';

const sb = {
  async req(method, path, body = null, params = null) {
    let url = `${SUPABASE_URL}/rest/v1/${path}`; // Backticks corregidos
    if (params) url += '?' + new URLSearchParams(params);
    
    const opts = {
      method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      }
    };
    if (body) opts.body = JSON.stringify(body);

    try {
      const r = await fetch(url, opts);
      const data = r.status === 204 ? [] : await r.json();
      if (!r.ok) throw new Error(data.message || 'Error Supabase');
      return { data, error: null };
    } catch (e) {
      console.error('Error:', e);
      return { data: null, error: e.message };
    }
  },
  select: (t, q = '*', p = {}) => sb.req('GET', t, null, { select: q, ...p }),
  insert: (t, b) => sb.req('POST', t, Array.isArray(b) ? b : [b]),
  update: (t, b, f) => sb.req('PATCH', `${t}?${f}`, b), // Backticks corregidos
  delete: (t, f) => sb.req('DELETE', `${t}?${f}`)    // Backticks corregidos
};

// Navegación
function go(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
}

function abrir(id) { document.getElementById(id).classList.add('open'); }
function cerrar(id) { document.getElementById(id).classList.remove('open'); }

// Carga de Productos con corrección de foto_url
async function rProductos() {
  const { data, error } = await sb.select('productos');
  if (error) return;
  const cont = document.getElementById('prod-list');
  cont.innerHTML = data.map(p => `
    <div class="card" style="display:flex; gap:12px; align-items:center;">
      <div style="width:50px; height:50px; background:var(--bg2); border-radius:8px; display:flex; align-items:center; justify-content:center;">
        ${p.foto_url ? `<img src="${p.foto_url}" style="width:100%; height:100%; border-radius:8px; object-fit:cover;"/>` : '📦'}
      </div>
      <div style="flex:1;">
        <div style="font-weight:700; color:var(--az);">${p.nombre}</div>
        <div style="font-size:0.75rem; color:var(--tx2);">Stock: ${p.stock} | $${p.precio_venta}</div>
      </div>
    </div>
  `).join('');
}

// Inicialización
window.onload = () => {
  rProductos();
};

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('SW activo'))
    .catch(err => console.error('Error SW:', err));
}
</script>
</body>
</html>
